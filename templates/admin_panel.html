<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>Admin Panel</h1>

    <button onclick="refreshDB()">Refresh Database</button>
    <button onclick="sendEmails()">Send Emails</button>

    <script>
        function refreshDB() {
            fetch("/admin/refresh", { method: "POST" })
                .then(response => response.json())
                .then(data => {
                    alert(data.message)
                })
                .catch(err => {
                    alert("Error refreshing database: " + err)
                });
        }

        function sendEmails() {
            fetch("/admin/send_emails", { method: "POST" })
                .then(response => response.json())
                .then(data => {
                    alert(data.message)
                })
                .catch(err => {
                    alert("Error sending emails: " + err)
                });
        }
    </script>

</body>
